<!DOCTYPE html>
<html>
  <head>
   <title>Multi-TiddlyWiki webs</title>
  </head>
  <body>
    <h1>Multi-TiddlyWiki webs</h1>
    <ul>
    {% for aWiki in wikis %}
      <li>
        <a href="{{ aWiki.url }}">{{ aWiki.title }}</a>
        <p>{{ aWiki.desc }}</p>
      </li>
    {% endfor %}
    </ul>
  </body>
</html>
